name: Deploy Web

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  pages: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      EXPO_BASE_URL: /Nutripaddi
      EXPO_PUBLIC_SUPABASE_URL: https://cjdmlregtadnxvxzxmxh.supabase.co
      EXPO_PUBLIC_SUPABASE_KEY: sb_publishable_dvVvO0RrsYMcXg-seccC7A_s_UpfuO0
      EXPO_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_dvVvO0RrsYMcXg-seccC7A_s_UpfuO0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          cache: npm
          node-version: 22

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Export web build
        run: npm run build:web

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
